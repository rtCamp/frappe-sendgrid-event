exclude: "(^|/)(node_modules|\\.git)(/|$)"
default_stages: [pre-commit]
default_install_hook_types: [pre-commit, commit-msg]
fail_fast: false

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        files: "frappe_sendgrid_event.*"
        exclude: ".*json$|.*txt$|.*csv|.*md|.*svg"
      - id: check-merge-conflict
      - id: check-ast
      - id: check-json
      - id: check-toml
      - id: check-yaml
      - id: debug-statements
      - id: end-of-file-fixer

  - repo: https://github.com/Lucas-C/pre-commit-hooks
    rev: v1.5.5
    hooks:
      - id: forbid-tabs
        exclude: "Makefile|.*\\.tsv|.*\\.go"

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.10
    hooks:
      - id: ruff
        name: "Run ruff import sorter"
        args: ["--select=I", "--fix"]

      - id: ruff
        name: "Run ruff linter"

      - id: ruff-format
        name: "Run ruff formatter"

  - repo: https://github.com/pre-commit/mirrors-eslint
    rev: v9.30.1
    hooks:
      - id: eslint
        name: "ESlint-js"
        types_or: [javascript]
        args: ["--quiet"]
        # Ignore any files that might contain jinja / bundles
        exclude: |
          (?x)^(
              frappe_sendgrid_event/public/dist/.*|
              cypress/.*|
              .*node_modules.*|
              .*boilerplate.*|
              frappe_sendgrid_event/templates/includes/.*|
              frappe_sendgrid_event/public/js/lib/.* |
              frappe_sendgrid_event/desk/.*
          )$

  - repo: local
    hooks:
      - id: clone-local-repo
        name: clone-local-repo
        entry: bash -c 'TARGET_DIR=".frappe-semgrep" && [ ! -d "$TARGET_DIR" ] && git clone "https://github.com/frappe/semgrep-rules" "$TARGET_DIR" || true'
        language: system
        always_run: true

  - repo: local
    hooks:
      - id: eslint
        name: "ESlint"
        entry: bash -c 'cd desk && npm run lint:precommit'
        language: system
        files: ^desk/src_override/.*\.(vue|jsx|tsx|ts)$
        types: [file]
        pass_filenames: true
        exclude: |
          (?x)^(
              .*node_modules.*
          )$

  - repo: https://github.com/semgrep/pre-commit
    rev: "v1.149.0"
    hooks:
      - id: semgrep-ci
        args:
          [
            "--config",
            "./.frappe-semgrep/rules",
            "--config",
            "r/python.lang.correctness",
            "--error",
            "--skip-unknown-extensions",
            "--metrics",
            "off",
          ]
ci:
  autoupdate_schedule: weekly
  skip: []
  submodules: false
